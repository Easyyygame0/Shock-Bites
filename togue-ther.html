<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Togue-Ther | ShockBites</title>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { display: ['Bebas Neue', 'sans-serif'], sans: ['Nunito', 'sans-serif'] } } } }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Nunito', sans-serif; background: #eef3e4; }
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .cart-overlay.open { opacity: 1; pointer-events: all; }
    .cart-drawer { position: fixed; top: 0; right: 0; height: 100%; width: 100%; max-width: 420px; background: #fff; z-index: 101; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
    .cart-drawer.open { transform: translateX(0); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 760px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; transform: scale(0.95); transition: transform 0.25s; }
    .modal-overlay.open .modal-box { transform: scale(1); }
    .modal-body { overflow-y: auto; flex: 1; }
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(0,0,0,0.15); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const CART_STORAGE_KEY = "shockbites-cart";
function normalizeCartItems(data) {
  if (!Array.isArray(data)) return [];
  return data.map(item => {
    if (!item || typeof item !== "object") return null;
    if (item.product && item.product.id) return item;
    if (item.id) {
      return {
        product: {
          id: item.id,
          name: item.name,
          price: item.price,
          description: item.description,
          category: item.category,
          image: item.image,
        },
        quantity: item.quantity || 1,
      };
    }
    return null;
  }).filter(Boolean);
}
function loadCart() {
  const stored = localStorage.getItem(CART_STORAGE_KEY);
  if (!stored) return [];
  try { return normalizeCartItems(JSON.parse(stored)); } catch { return []; }
}
function saveCart(cart) {
  localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(cart));
}
const ORDERS_STORAGE_KEY = "restaurantOrders";
function pushRestaurantOrder(order) {
  try {
    const existing = JSON.parse(localStorage.getItem(ORDERS_STORAGE_KEY) || "[]");
    const next = Array.isArray(existing) ? [...existing, order] : [order];
    localStorage.setItem(ORDERS_STORAGE_KEY, JSON.stringify(next));
  } catch (error) {
    console.error("Could not save restaurant order", error);
  }
}

const COMBOS = [
  { id: 101, name: "Savor & Sip Combo", price: 189, description: "1pc Sproutarma paired with refreshing Fruitees", image: "images/savor-and-sip-combo.png" },
  { id: 102, name: "Perfect Pair", price: 159, description: "3pcs Togueth Wrap paired with refreshing Fruitees", image: "images/Perfect-Pair.png" },
  { id: 103, name: "Savor & Sip Trio", price: 259, description: "1pc Sproutarma paired with refreshing Fruitees", image: "images/savor-and-sip-trio.png" },
  { id: 104, name: "Togchomp Premium Duo", price: 209, description: "1pc Togchomp Premium Burger paired with refreshing Fruitees", image: "images/togchomp-premium-duo.png" },
  { id: 105, name: "Togchomp Deluxe Trio", price: 289, description: "1pc Togchomp Deluxe Burger with fries and refreshing Fruitees", image: "images/togchomp-deluxe-trio.png" },
  { id: 106, name: "Perfect Trio", price: 239, description: "3pcs Togueth Wrap with fries and refreshing Fruitees", image: "images/perfect-trio.png" },
];

function Navbar({ cartCount, onCartOpen }) {
  const links = [
    { label: "About Us", id: "about" },
    { label: "Menu", href: "menu.html" },
    { label: "Togue-ther", href: "togue-ther.html" },
    { label: "Contact", id: "contact" },
  ];
  return (
    <header className="fixed top-0 w-full z-50 shadow-lg" style={{ background: "#1e5c2e" }}>
      <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        <button onClick={() => window.location.href = "index.html"} className="flex items-center gap-3">
          <img src="images/Shockbites-logo.png" alt="ShockBites" className="h-16 w-auto" />
          <span className="font-display text-2xl tracking-widest text-white hidden sm:block">SHOCKBITES</span>
        </button>
        <nav className="hidden md:flex items-center gap-10">
          {links.map(l => (
            <a key={l.label} href={l.href} className="font-display text-lg tracking-widest text-white/90 hover:text-yellow-300 transition-colors">{l.label}</a>
          ))}
        </nav>
        <button onClick={onCartOpen} className="relative w-11 h-11 rounded-full flex items-center justify-center text-white hover:bg-white/10 transition-colors">
          <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          {cartCount > 0 && (
            <span className="absolute -top-1 -right-1 w-5 h-5 rounded-full flex items-center justify-center text-xs font-black" style={{ background: "#d4f53c", color: "#1e5c2e" }}>{cartCount}</span>
          )}
        </button>
      </div>
    </header>
  );
}

function CartDrawer({ cart, isOpen, onClose, onUpdateQty, onRemove, onCheckout }) {
  const subtotal = cart.reduce((s, i) => s + i.product.price * i.quantity, 0);
  return (
    <>
      <div className={`cart-overlay ${isOpen ? "open" : ""}`} onClick={onClose} />
      <div className={`cart-drawer ${isOpen ? "open" : ""}`}>
        <div className="p-6 flex items-center justify-between flex-shrink-0" style={{ background: "#1e5c2e" }}>
          <span className="font-display text-2xl tracking-widest text-white">YOUR ORDER</span>
          <button onClick={onClose} className="w-9 h-9 rounded-full flex items-center justify-center text-white hover:bg-white/10 transition-colors">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div className="overflow-y-auto flex-1 p-6" style={{ maxHeight: "calc(100vh - 200px)" }}>
          {cart.length === 0 ? (
            <div className="flex flex-col items-center justify-center h-full gap-4 py-20" style={{ color: "#5a7a4a" }}>
              <p className="font-display text-xl tracking-wider text-center">Your bag is shockingly empty</p>
              <p className="text-sm text-center">Add some combos!</p>
            </div>
          ) : (
            <div className="space-y-4">
              {cart.map(item => (
                <div key={item.product.id} className="flex gap-4 items-center p-4 rounded-xl border" style={{ background: "rgba(30,92,46,0.05)", borderColor: "rgba(30,92,46,0.15)" }}>
                  <div className="w-14 h-14 rounded-xl flex-shrink-0 overflow-hidden">
                    <img src={item.product.image} alt={item.product.name} className="w-full h-full object-cover" />
                  </div>
                  <div className="flex-1 min-w-0">
                    <h4 className="font-bold text-sm leading-tight" style={{ color: "#1a3a1a" }}>{item.product.name}</h4>
                    <p className="font-bold text-sm" style={{ color: "#1e5c2e" }}>₱{item.product.price}</p>
                  </div>
                  <div className="flex items-center gap-2">
                    <button onClick={() => onUpdateQty(item.product.id, -1)} className="w-7 h-7 rounded-full flex items-center justify-center font-bold text-white" style={{ background: "#1e5c2e" }}>-</button>
                    <span className="font-bold text-sm w-4 text-center">{item.quantity}</span>
                    <button onClick={() => onUpdateQty(item.product.id, 1)} className="w-7 h-7 rounded-full flex items-center justify-center font-bold text-white" style={{ background: "#1e5c2e" }}>+</button>
                  </div>
                  <button onClick={() => onRemove(item.product.id)} className="text-red-400 hover:text-red-600 ml-1">🗑</button>
                </div>
              ))}
            </div>
          )}
        </div>
        {cart.length > 0 && (
          <div className="p-6 border-t">
            <div className="flex justify-between mb-4">
              <span className="font-display text-lg tracking-wider" style={{ color: "#1e5c2e" }}>SUBTOTAL</span>
              <span className="font-display text-lg" style={{ color: "#1e5c2e" }}>₱{subtotal}</span>
            </div>
            <button onClick={onCheckout} className="w-full py-4 rounded-xl font-display text-lg tracking-widest text-white" style={{ background: "#1e5c2e" }}>
              PROCEED TO CHECKOUT
            </button>
          </div>
        )}
      </div>
    </>
  );
}

function CheckoutModal({ cart, isOpen, onClose }) {
  const [form, setForm] = useState({ fullName: "", phone: "", paymentMethod: "card", cardNumber: "", expiry: "", cvv: "" });
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(false);
  const [success, setSuccess] = useState(false);
  const [orderPlaced, setOrderPlaced] = useState(false);
  const orderNum = "OR-" + Math.floor(100000 + Math.random() * 900000);
  const subtotal = cart.reduce((s, i) => s + i.product.price * i.quantity, 0);

  const validate = () => {
    const e = {};
    if (!form.fullName || form.fullName.length < 2) e.fullName = "Full name is required";
    if (!form.phone || !/^[0-9+\-\s]{7,20}$/.test(form.phone)) e.phone = "Valid phone number is required";
    if (form.paymentMethod === "card") {
      if (!form.cardNumber || form.cardNumber.replace(/\s/g, "").length < 16) e.cardNumber = "Valid card number required";
      if (!form.expiry) e.expiry = "Expiry date required";
      if (!form.cvv || form.cvv.length < 3) e.cvv = "CVV required";
    }
    return e;
  };

  const submit = async (e) => {
    e.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length > 0) { setErrors(errs); return; }
    setErrors({});
    setLoading(true);
    await new Promise(r => setTimeout(r, 1200));
    setLoading(false);

    const order = {
      id: orderNum,
      customer: {
        name: form.fullName,
        phone: form.phone,
      },
      items: cart.map(item => ({ name: item.product.name, qty: item.quantity, price: item.product.price, subtotal: item.product.price * item.quantity })),
      total: subtotal,
      payment: form.paymentMethod === "card" ? "Card" : form.paymentMethod === "gcash" ? "GCash" : "COD",
      status: "Pending",
      timestamp: new Date().toISOString(),
    };

    pushRestaurantOrder(order);
    setSuccess(true);
    if (!orderPlaced) {
      setOrderPlaced(true);
    }
  };

  const handleClose = () => {
    onClose();
    setSuccess(false);
    setOrderPlaced(false);
    setForm({ fullName: "", phone: "", paymentMethod: "card", cardNumber: "", expiry: "", cvv: "" });
    setErrors({});
  };

  const field = (name, label, placeholder, extra = {}) => (
    <div>
      <label className="block text-sm font-bold mb-1" style={{ color: "#1a3a1a" }}>{label}</label>
      <input name={name} value={form[name]} placeholder={placeholder}
        onChange={e => setForm(f => ({ ...f, [name]: e.target.value }))}
        className="w-full px-4 py-2 rounded-xl border-2 font-semibold text-sm transition-colors"
        style={{ borderColor: errors[name] ? "#dc2626" : "rgba(30,92,46,0.25)", color: "#1a3a1a" }}
        {...extra}
      />
      {errors[name] && <p className="text-red-500 text-xs mt-1 font-semibold">{errors[name]}</p>}
    </div>
  );

  return (
    <div className={`modal-overlay ${isOpen ? "open" : ""}`} onClick={e => e.target === e.currentTarget && handleClose()}>
      <div className="modal-box">
        <div className="p-6 flex items-center justify-between flex-shrink-0" style={{ background: "#1e5c2e" }}>
          <span className="font-display text-2xl tracking-widest text-white">{success ? "ORDER PLACED!" : "CHECKOUT"}</span>
          <button onClick={handleClose} className="w-9 h-9 rounded-full flex items-center justify-center text-white hover:bg-white/10 transition-colors">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        {success ? (
          <div className="p-12 flex flex-col items-center justify-center text-center gap-5">
            <div className="w-24 h-24 rounded-full flex items-center justify-center text-white text-4xl shadow-lg" style={{ background: "#1e5c2e" }}>✓</div>
            <h2 className="font-display text-4xl tracking-wider" style={{ color: "#1e5c2e" }}>ORDER CONFIRMED!</h2>
            <p className="text-lg font-semibold" style={{ color: "#5a7a4a" }}>Your order has been saved.</p>
            <div className="px-8 py-4 rounded-xl border" style={{ background: "#eef3e4", borderColor: "rgba(30,92,46,0.2)" }}>
              <p className="text-xs font-bold uppercase tracking-widest mb-1" style={{ color: "#5a7a4a" }}>Order Number</p>
              <p className="font-display text-3xl tracking-wider" style={{ color: "#1e5c2e" }}>{orderNum}</p>
            </div>
            <button onClick={handleClose}
              className="font-display tracking-widest text-lg px-12 py-4 rounded-xl text-white hover:opacity-90 transition-all"
              style={{ background: "#1e5c2e" }}>
              CONTINUE SHOPPING
            </button>
          </div>
        ) : (
          <div className="modal-body">
            <div className="grid md:grid-cols-2">
              <div className="p-6 border-r" style={{ background: "#f0f4e8", borderColor: "rgba(30,92,46,0.15)" }}>
                <h3 className="font-display text-xl tracking-wider uppercase mb-4" style={{ color: "#1e5c2e" }}>Your Order</h3>
                <div className="space-y-3 mb-6">
                  {cart.map(item => (
                    <div key={item.product.id} className="flex justify-between items-center text-sm">
                      <span className="font-semibold" style={{ color: "#1a3a1a" }}>{item.product.name} <span style={{ color: "#5a7a4a" }}>×{item.quantity}</span></span>
                      <span className="font-bold" style={{ color: "#1e5c2e" }}>₱{item.product.price * item.quantity}</span>
                    </div>
                  ))}
                </div>
                <div className="border-t pt-4 flex justify-between items-center" style={{ borderColor: "rgba(30,92,46,0.2)" }}>
                  <span className="font-display text-xl tracking-wider" style={{ color: "#1e5c2e" }}>TOTAL</span>
                  <span className="font-black text-2xl" style={{ color: "#1e5c2e" }}>₱{subtotal}</span>
                </div>
              </div>
              <form onSubmit={submit} className="p-6 space-y-4">
                {field("fullName", "Full Name", "Juan Dela Cruz")}
                {field("phone", "Phone", "+63 912 345 6789", { type: "tel" })}
                <div>
                  <label className="block text-sm font-bold mb-2" style={{ color: "#1a3a1a" }}>Payment Method</label>
                  <div className="grid grid-cols-3 gap-2">
                    {[ ["card","Credit Card"], ["gcash","GCash"], ["cod","COD"] ].map(([val, label]) => (
                      <button key={val} type="button"
                        onClick={() => setForm(f => ({ ...f, paymentMethod: val }))}
                        className="py-2 px-3 rounded-xl border-2 text-xs font-bold transition-all"
                        style={form.paymentMethod === val
                          ? { borderColor: "#1e5c2e", background: "rgba(30,92,46,0.1)", color: "#1e5c2e" }
                          : { borderColor: "rgba(30,92,46,0.2)", color: "#5a7a4a" }
                        }>
                        {label}
                      </button>
                    ))}
                  </div>
                </div>
                {form.paymentMethod === "card" && (
                  <div className="space-y-3">
                    {field("cardNumber", "Card Number", "1234 5678 9012 3456", { maxLength: 19 })}
                    <div className="grid grid-cols-2 gap-3">
                      {field("expiry", "Expiry", "MM/YY", { maxLength: 5 })}
                      {field("cvv", "CVV", "123", { maxLength: 4 })}
                    </div>
                  </div>
                )}
                <button type="submit" disabled={loading}
                  className="w-full py-4 rounded-xl font-display tracking-widest text-lg text-white transition-all flex items-center justify-center gap-3"
                  style={{ background: "#1e5c2e", opacity: loading ? 0.8 : 1 }}>
                  {loading ? <><div className="spinner" />Placing Order...</> : "PLACE ORDER"}
                </button>
              </form>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [cart, setCart] = useState(() => loadCart());
  const [cartOpen, setCartOpen] = useState(false);
  const [checkoutOpen, setCheckoutOpen] = useState(false);

  useEffect(() => {
    saveCart(cart);
  }, [cart]);

  const addToCart = (combo) => {
    setCart(prev => {
      const existing = prev.find(i => i.product.id === combo.id);
      if (existing) return prev.map(i => i.product.id === combo.id ? { ...i, quantity: i.quantity + 1 } : i);
      return [...prev, { product: combo, quantity: 1 }];
    });
    setCartOpen(true);
  };

  const updateQty = (id, delta) => {
    setCart(prev => prev.map(i => i.product.id === id ? { ...i, quantity: i.quantity + delta } : i).filter(i => i.quantity > 0));
  };

  const remove = (id) => setCart(prev => prev.filter(i => i.product.id !== id));
  const cartCount = cart.reduce((s, i) => s + i.quantity, 0);
  const openCheckout = () => { setCartOpen(false); setCheckoutOpen(true); };

  return (
    <>
      <Navbar cartCount={cartCount} onCartOpen={() => setCartOpen(true)} />
      <main className="pt-28 pb-16" style={{ background: "#eef3e4" }}>
        <div className="max-w-7xl mx-auto px-4">
          <div className="text-center mb-12">
            <h1 className="font-display text-6xl md:text-7xl tracking-wider mb-4" style={{ color: "#1e5c2e" }}>TOGUE-THER COMBOS</h1>
            <p className="text-lg font-semibold" style={{ color: "#5a7a4a" }}>Better together — pick your perfect combo!</p>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            {COMBOS.map(combo => {
              const inCart = cart.some(i => i.product.id === combo.id);
              return (
                <div key={combo.id} className="bg-white rounded-3xl overflow-hidden shadow-md hover:shadow-xl transition-shadow border-2" style={{ borderColor: "#d4f53c" }}>
                  <div className="relative">
                    <img src={combo.image} alt={combo.name} className="w-full h-56 object-cover" />
                    <div className="absolute top-4 left-4 rounded-full flex items-center justify-center w-20 h-20 shadow-lg" style={{ background: "#1e5c2e" }}>
                      <div className="text-center">
                        <div className="text-white text-xs font-bold">For only</div>
                        <div className="font-display text-xl tracking-wider" style={{ color: "#d4f53c" }}>₱{combo.price}</div>
                      </div>
                    </div>
                  </div>
                  <div className="p-6 flex flex-col" style={{ minHeight: "160px" }}>
                    <h3 className="font-display text-2xl tracking-wider mb-2" style={{ color: "#1e5c2e" }}>{combo.name}</h3>
                    <p className="text-sm font-semibold mb-4 flex-1" style={{ color: "#5a7a4a" }}>{combo.description}</p>
                    <button
                      onClick={() => addToCart(combo)}
                      className="w-full py-3 rounded-xl font-bold text-sm transition-all"
                      style={inCart
                        ? { background: "rgba(30,92,46,0.1)", color: "#1e5c2e", border: "2px solid #1e5c2e" }
                        : { background: "#1e5c2e", color: "#fff" }
                      }
                    >
                      {inCart ? "✓ Added to Cart" : "Add to Cart"}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </main>
      <CartDrawer cart={cart} isOpen={cartOpen} onClose={() => setCartOpen(false)} onUpdateQty={updateQty} onRemove={remove} onCheckout={openCheckout} />
      <CheckoutModal cart={cart} isOpen={checkoutOpen} onClose={() => { setCheckoutOpen(false); setCart([]); }} />
      <footer style={{ background: "#1e5c2e" }}>
        <div className="max-w-7xl mx-auto px-4 py-10">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
            <div>
              <div className="flex items-center gap-3 mb-4">
                <img src="images/Shockbites-logo.png" alt="ShockBites" className="h-12 w-auto" />
                <span className="font-display text-2xl tracking-widest text-white">SHOCKBITES</span>
              </div>
              <p className="text-white/60 text-sm">Bold flavors, fresh ingredients, and unforgettable bites.</p>
            </div>
            <div>
              <h4 className="font-display text-lg tracking-wider text-white mb-4">QUICK LINKS</h4>
              <div className="flex flex-col gap-2">
                <a href="index.html" className="text-white/60 text-sm hover:text-white transition-colors">Home</a>
                <a href="index.html#about" className="text-white/60 text-sm hover:text-white transition-colors">About Us</a>
                <a href="menu.html" className="text-white/60 text-sm hover:text-white transition-colors">Menu</a>
                <a href="index.html#contact" className="text-white/60 text-sm hover:text-white transition-colors">Contact</a>
              </div>
            </div>
            <div>
              <h4 className="font-display text-lg tracking-wider text-white mb-4">FOLLOW US</h4>
              <div className="flex flex-col gap-2">
                <a href="https://www.tiktok.com/@shockbites7" target="_blank" className="text-white/60 text-sm hover:text-white transition-colors">🎵 TikTok — @shockbites7</a>
                <a href="https://www.instagram.com/ShockBites11" target="_blank" className="text-white/60 text-sm hover:text-white transition-colors">📸 Instagram — ShockBites11</a>
                <a href="https://www.facebook.com/ShockBites" target="_blank" className="text-white/60 text-sm hover:text-white transition-colors">👥 Facebook — ShockBites</a>
              </div>
            </div>
