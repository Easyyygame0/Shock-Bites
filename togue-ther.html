<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Togue-Ther | ShockBites</title>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { display: ['Bebas Neue', 'sans-serif'], sans: ['Nunito', 'sans-serif'] } } } }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Nunito', sans-serif; background: #eef3e4; }
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .cart-overlay.open { opacity: 1; pointer-events: all; }
    .cart-drawer { position: fixed; top: 0; right: 0; height: 100%; width: 100%; max-width: 420px; background: #fff; z-index: 101; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
    .cart-drawer.open { transform: translateX(0); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const CART_STORAGE_KEY = "shockbites-cart";
function normalizeCartItems(data) {
  if (!Array.isArray(data)) return [];
  return data.map(item => {
    if (!item || typeof item !== "object") return null;
    if (item.product && item.product.id) return item;
    if (item.id) {
      return {
        product: {
          id: item.id,
          name: item.name,
          price: item.price,
          description: item.description,
          category: item.category,
          image: item.image,
        },
        quantity: item.quantity || 1,
      };
    }
    return null;
  }).filter(Boolean);
}
function loadCart() {
  const stored = localStorage.getItem(CART_STORAGE_KEY);
  if (!stored) return [];
  try { return normalizeCartItems(JSON.parse(stored)); } catch { return []; }
}
function saveCart(cart) {
  localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(cart));
}

const COMBOS = [
  { id: 101, name: "Savor & Sip Combo", price: 189, description: "1pc Sproutarma paired with refreshing Fruitees", image: "images/savor-and-sip-combo.png" },
  { id: 102, name: "Perfect Pair", price: 159, description: "3pcs Togueth Wrap paired with refreshing Fruitees", image: "images/Perfect-Pair.png" },
  { id: 103, name: "Savor & Sip Trio", price: 259, description: "1pc Sproutarma paired with refreshing Fruitees", image: "images/savor-and-sip-trio.png" },
  { id: 104, name: "Togchomp Premium Duo", price: 209, description: "1pc Togchomp Premium Burger paired with refreshing Fruitees", image: "images/togchomp-premium-duo.png" },
  { id: 105, name: "Togchomp Deluxe Trio", price: 289, description: "1pc Togchomp Deluxe Burger with fries and refreshing Fruitees", image: "images/togchomp-deluxe-trio.png" },
  { id: 106, name: "Perfect Trio", price: 239, description: "3pcs Togueth Wrap with fries and refreshing Fruitees", image: "images/perfect-trio.png" },
];

function Navbar({ cartCount, onCartOpen }) {
  const links = [
    { label: "About Us", id: "about" },
    { label: "Menu", href: "menu.html" },
    { label: "Togue-ther", href: "togue-ther.html" },
    { label: "Contact", id: "contact" },
  ];
  return (
    <header className="fixed top-0 w-full z-50 shadow-lg" style={{ background: "#1e5c2e" }}>
      <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        <button onClick={() => window.location.href = "index.html"} className="flex items-center gap-3">
          <img src="images/Shockbites-logo.png" alt="ShockBites" className="h-16 w-auto" />
          <span className="font-display text-2xl tracking-widest text-white hidden sm:block">SHOCKBITES</span>
        </button>
        <nav className="hidden md:flex items-center gap-10">
          {links.map(l => (
            <a key={l.label} href={l.href} className="font-display text-lg tracking-widest text-white/90 hover:text-yellow-300 transition-colors">{l.label}</a>
          ))}
        </nav>
        <button onClick={onCartOpen} className="relative w-11 h-11 rounded-full flex items-center justify-center text-white hover:bg-white/10 transition-colors">
          <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          {cartCount > 0 && (
            <span className="absolute -top-1 -right-1 w-5 h-5 rounded-full flex items-center justify-center text-xs font-black" style={{ background: "#d4f53c", color: "#1e5c2e" }}>{cartCount}</span>
          )}
        </button>
      </div>
    </header>
  );
}

function CartDrawer({ cart, isOpen, onClose, onUpdateQty, onRemove, onCheckout }) {
  const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
  return (
    <>
      <div className={`cart-overlay ${isOpen ? "open" : ""}`} onClick={onClose} />
      <div className={`cart-drawer ${isOpen ? "open" : ""}`}>
        <div className="p-6 flex items-center justify-between flex-shrink-0" style={{ background: "#1e5c2e" }}>
          <span className="font-display text-2xl tracking-widest text-white">YOUR ORDER</span>
          <button onClick={onClose} className="w-9 h-9 rounded-full flex items-center justify-center text-white hover:bg-white/10 transition-colors">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div className="overflow-y-auto flex-1 p-6" style={{ maxHeight: "calc(100vh - 200px)" }}>
          {cart.length === 0 ? (
            <div className="flex flex-col items-center justify-center h-full gap-4 py-20" style={{ color: "#5a7a4a" }}>
              <p className="font-display text-xl tracking-wider text-center">Your bag is shockingly empty</p>
              <p className="text-sm text-center">Add some combos!</p>
            </div>
          ) : (
            <div className="space-y-4">
              {cart.map(item => (
                <div key={item.product.id} className="flex gap-4 items-center p-4 rounded-xl border" style={{ background: "rgba(30,92,46,0.05)", borderColor: "rgba(30,92,46,0.15)" }}>
                  <div className="w-14 h-14 rounded-xl flex-shrink-0 overflow-hidden">
                    <img src={item.product.image} alt={item.product.name} className="w-full h-full object-cover" />
                  </div>
                  <div className="flex-1 min-w-0">
                    <h4 className="font-bold text-sm leading-tight" style={{ color: "#1a3a1a" }}>{item.product.name}</h4>
                    <p className="font-bold text-sm" style={{ color: "#1e5c2e" }}>₱{item.product.price}</p>
                  </div>
                  <div className="flex items-center gap-2">
                    <button onClick={() => onUpdateQty(item.product.id, -1)} className="w-7 h-7 rounded-full flex items-center justify-center font-bold text-white" style={{ background: "#1e5c2e" }}>-</button>
                    <span className="font-bold text-sm w-4 text-center">{item.quantity}</span>
                    <button onClick={() => onUpdateQty(item.product.id, 1)} className="w-7 h-7 rounded-full flex items-center justify-center font-bold text-white" style={{ background: "#1e5c2e" }}>+</button>
                  </div>
                  <button onClick={() => onRemove(item.product.id)} className="text-red-400 hover:text-red-600 ml-1">🗑</button>
                </div>
              ))}
            </div>
          )}
        </div>
        {cart.length > 0 && (
          <div className="p-6 border-t">
            <div className="flex justify-between mb-4">
              <span className="font-display text-lg tracking-wider" style={{ color: "#1e5c2e" }}>SUBTOTAL</span>
              <span className="font-display text-lg" style={{ color: "#1e5c2e" }}>₱{subtotal}</span>
            </div>
            <button onClick={onCheckout} className="w-full py-4 rounded-xl font-display text-lg tracking-widest text-white" style={{ background: "#1e5c2e" }}>
              PROCEED TO CHECKOUT
            </button>
          </div>
        )}
      </div>
    </>
  );
}

function App() {
  const [cart, setCart] = useState(() => loadCart());
  const [cartOpen, setCartOpen] = useState(false);

  useEffect(() => {
    saveCart(cart);
  }, [cart]);

  const addToCart = (combo) => {
    setCart(prev => {
      const existing = prev.find(i => i.product.id === combo.id);
      if (existing) return prev.map(i => i.product.id === combo.id ? { ...i, quantity: i.quantity + 1 } : i);
      return [...prev, { product: combo, quantity: 1 }];
    });
    setCartOpen(true);
  };

  const updateQty = (id, delta) => {
    setCart(prev => prev.map(i => i.product.id === id ? { ...i, quantity: i.quantity + delta } : i).filter(i => i.quantity > 0));
  };

  const remove = (id) => setCart(prev => prev.filter(i => i.product.id !== id));
  const cartCount = cart.reduce((s, i) => s + i.quantity, 0);

  return (
    <>
      <Navbar cartCount={cartCount} onCartOpen={() => setCartOpen(true)} />
      <main className="pt-28 pb-16" style={{ background: "#eef3e4" }}>
        <div className="max-w-7xl mx-auto px-4">
          <div className="text-center mb-12">
            <h1 className="font-display text-6xl md:text-7xl tracking-wider mb-4" style={{ color: "#1e5c2e" }}>TOGUE-THER COMBOS</h1>
            <p className="text-lg font-semibold" style={{ color: "#5a7a4a" }}>Better together — pick your perfect combo!</p>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            {COMBOS.map(combo => {
              const inCart = cart.some(i => i.product.id === combo.id);
              return (
                <div key={combo.id} className="bg-white rounded-3xl overflow-hidden shadow-md hover:shadow-xl transition-shadow border-2" style={{ borderColor: "#d4f53c" }}>
                  <div className="relative">
                    <img src={combo.image} alt={combo.name} className="w-full h-56 object-cover" />
                    <div className="absolute top-4 left-4 rounded-full flex items-center justify-center w-20 h-20 shadow-lg" style={{ background: "#1e5c2e" }}>
                      <div className="text-center">
                        <div className="text-white text-xs font-bold">For only</div>
                        <div className="font-display text-xl tracking-wider" style={{ color: "#d4f53c" }}>₱{combo.price}</div>
                      </div>
                    </div>
                  </div>
                  <div className="p-6 flex flex-col" style={{ minHeight: "160px" }}>
                    <h3 className="font-display text-2xl tracking-wider mb-2" style={{ color: "#1e5c2e" }}>{combo.name}</h3>
                    <p className="text-sm font-semibold mb-4 flex-1" style={{ color: "#5a7a4a" }}>{combo.description}</p>
                    <button
                      onClick={() => addToCart(combo)}
                      className="w-full py-3 rounded-xl font-bold text-sm transition-all"
                      style={inCart
                        ? { background: "rgba(30,92,46,0.1)", color: "#1e5c2e", border: "2px solid #1e5c2e" }
                        : { background: "#1e5c2e", color: "#fff" }
                      }
                    >
                      {inCart ? "✓ Added to Cart" : "Add to Cart"}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </main>
      <CartDrawer cart={cart} isOpen={cartOpen} onClose={() => setCartOpen(false)} onUpdateQty={updateQty} onRemove={remove} onCheckout={() => alert("Thank you for your order!")} />
      <footer style={{ background: "#1e5c2e" }}>
        <div className="max-w-7xl mx-auto px-4 py-10">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
            <div>
              <div className="flex items-center gap-3 mb-4">
                <img src="images/Shockbites-logo.png" alt="ShockBites" className="h-12 w-auto" />
                <span className="font-display text-2xl tracking-widest text-white">SHOCKBITES</span>
              </div>
              <p className="text-white/60 text-sm">Bold flavors, fresh ingredients, and unforgettable bites.</p>
            </div>
            <div>
              <h4 className="font-display text-lg tracking-wider text-white mb-4">QUICK LINKS</h4>
              <div className="flex flex-col gap-2">
                <a href="index.html" className="text-white/60 text-sm hover:text-white transition-colors">Home</a>
                <a href="index.html#about" className="text-white/60 text-sm hover:text-white transition-colors">About Us</a>
                <a href="menu.html" className="text-white/60 text-sm hover:text-white transition-colors">Menu</a>
                <a href="index.html#contact" className="text-white/60 text-sm hover:text-white transition-colors">Contact</a>
              </div>
            </div>
            <div>
              <h4 className="font-display text-lg tracking-wider text-white mb-4">FOLLOW US</h4>
              <div className="flex flex-col gap-2">
                <a href="https://www.tiktok.com/@shockbites7" target="_blank" className="text-white/60 text-sm hover:text-white transition-colors">🎵 TikTok — @shockbites7</a>
                <a href="https://www.instagram.com/ShockBites11" target="_blank" className="text-white/60 text-sm hover:text-white transition-colors">📸 Instagram — ShockBites11</a>
                <a href="https://www.facebook.com/ShockBites" target="_blank" className="text-white/60 text-sm hover:text-white transition-colors">👥 Facebook — ShockBites</a>
              </div>
            </div>
          </div>
          <div className="border-t border-white/20 pt-6 flex flex-col md:flex-row items-center justify-between gap-4">
            <p className="text-white/40 text-sm">© 2025 ShockBites. All rights reserved.</p>
            <p className="text-white/40 text-sm"><a href="https://maps.google.com/?q=72+G.+Marcelo+Street+Barangay+Maysan+Valenzuela+City" target="_blank" className="hover:underline text-white/40">72 G. Marcelo Street, Barangay Maysan, Valenzuela City</a> | Mon–Sun: 11AM–9PM</p>
          </div>
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
