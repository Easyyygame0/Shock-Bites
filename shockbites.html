<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShockBites</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS (Play CDN - no build needed) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Bebas Neue', 'sans-serif'],
            sans: ['Nunito', 'sans-serif'],
          },
          colors: {
            brand: {
              green:  '#1e5c2e',
              light:  '#e8f0e1',
              cream:  '#f0f4e8',
              accent: '#d4f53c',
              card:   '#ffffff',
              muted:  '#5a7a4a',
            }
          }
        }
      }
    }
  </script>

  <!-- React + ReactDOM (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel (for JSX in the browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Nunito', sans-serif; background: #f0f4e8; color: #1a3a1a; }

    /* Cart drawer slide-in */
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .cart-overlay.open { opacity: 1; pointer-events: all; }
    .cart-drawer { position: fixed; top: 0; right: 0; height: 100%; width: 100%; max-width: 420px; background: #fff; z-index: 101; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; }
    .cart-drawer.open { transform: translateX(0); }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 760px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; transform: scale(0.95); transition: transform 0.25s; }
    .modal-overlay.open .modal-box { transform: scale(1); }

    /* Scrollable inner */
    .modal-body { overflow-y: auto; flex: 1; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }

    /* Smooth scroll */
    html { scroll-behavior: smooth; }

    /* Number input without arrows */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

    /* Focus ring */
    input:focus, select:focus, textarea:focus { outline: 2px solid #1e5c2e; outline-offset: 2px; }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useMemo } = React;

/* ── DATA ───────────────────────────────────────────── */
const PRODUCTS = [
  { id: 1, name: "ShockBite Classic",      category: "Burgers",  price: 149, description: "Signature double patty, pickles, special ShockSauce" },
  { id: 2, name: "Crispy Crunch Burger",   category: "Burgers",  price: 159, description: "Crispy fried chicken fillet, coleslaw, honey mustard" },
  { id: 3, name: "Mushroom Melt",          category: "Burgers",  price: 169, description: "Beef patty topped with sautéed mushrooms and swiss cheese" },
  { id: 4, name: "Signature Wrap",         category: "Wraps",    price: 139, description: "Grilled chicken, fresh greens, tomato, garlic aioli" },
  { id: 5, name: "BBQ Bacon Wrap",         category: "Wraps",    price: 149, description: "Smoky bacon, cheddar, BBQ drizzle, crispy onions" },
  { id: 6, name: "Loaded Nachos",          category: "Sides",    price: 119, description: "House chips, cheese sauce, jalapeños, sour cream" },
  { id: 7, name: "Cheese Fries",           category: "Sides",    price: 99,  description: "Golden fries smothered in creamy cheddar sauce" },
  { id: 8, name: "Chicken Strips",         category: "Sides",    price: 129, description: "Five golden-fried strips with your choice of dipping sauce" },
];

const CATEGORIES = ["All", "Burgers", "Wraps", "Sides"];

const GRADIENTS = [
  "#1e5c2e,#2e7d42", "#1a6644,#2e8c5a", "#2a5c1a,#3e7a2a",
  "#1c5a50,#2e7a6a", "#3a6a1a,#1e5c2e", "#163d1e,#2e6a3a",
  "#2a5c30,#1e4a28", "#1e5c38,#2a7a50",
];

/* ── HELPERS ─────────────────────────────────────────── */
function scrollTo(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: "smooth" });
}

function CardVisual({ product }) {
  const [from, to] = GRADIENTS[product.id % GRADIENTS.length].split(",");
  return (
    <div
      style={{ background: `linear-gradient(135deg, ${from}, ${to})` }}
      className="aspect-[4/3] w-full flex items-center justify-center relative overflow-hidden"
    >
      <div className="text-center text-white p-6 relative z-10">
        <div className="font-display text-3xl tracking-wider leading-tight uppercase drop-shadow">{product.name}</div>
        <div className="text-xs font-semibold opacity-70 uppercase tracking-widest mt-1">{product.category}</div>
      </div>
    </div>
  );
}

/* ── NAVBAR ──────────────────────────────────────────── */
function Navbar({ cartCount, onCartOpen }) {
  const [mobileOpen, setMobileOpen] = useState(false);
  const links = [
    { label: "About Us", id: "about" },
    { label: "Menu",     id: "menu"  },
    { label: "Offers",   id: "offers"},
    { label: "Contact",  id: "contact"},
  ];

  return (
    <header className="fixed top-0 w-full z-50 shadow-lg" style={{ background: "#1e5c2e" }}>
      <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        {/* Logo */}
        <button onClick={() => scrollTo("hero")} className="flex items-center gap-3">
          <div className="w-11 h-11 rounded-full flex items-center justify-center font-display text-xl font-bold"
               style={{ background: "#d4f53c", color: "#1e5c2e" }}>SB</div>
          <span className="font-display text-2xl tracking-widest text-white hidden sm:block">SHOCKBITES</span>
        </button>

        {/* Desktop links */}
        <nav className="hidden md:flex items-center gap-10">
          {links.map(l => (
            <button key={l.id} onClick={() => scrollTo(l.id)}
              className="font-display text-lg tracking-widest text-white/90 hover:text-yellow-300 transition-colors">
              {l.label}
            </button>
          ))}
        </nav>

        {/* Cart + mobile toggle */}
        <div className="flex items-center gap-2">
          <button onClick={onCartOpen}
            className="relative w-11 h-11 rounded-full flex items-center justify-center text-white hover:bg-white/10 transition-colors"
            aria-label="Open cart">
            {/* Cart icon (SVG) */}
            <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
              <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>
            {cartCount > 0 && (
              <span className="absolute -top-1 -right-1 w-5 h-5 rounded-full flex items-center justify-center text-xs font-black"
                    style={{ background: "#d4f53c", color: "#1e5c2e" }}>
                {cartCount}
              </span>
            )}
          </button>

          <button className="md:hidden w-11 h-11 rounded-full flex items-center justify-center text-white hover:bg-white/10 transition-colors"
            onClick={() => setMobileOpen(o => !o)}>
            <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
              <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      {/* Mobile menu */}
      {mobileOpen && (
        <div className="md:hidden border-t border-white/20 py-4 px-4 space-y-2" style={{ background: "#1e5c2e" }}>
          {links.map(l => (
            <button key={l.id} onClick={() => { scrollTo(l.id); setMobileOpen(false); }}
              className="block w-full text-left font-display text-lg tracking-widest text-white/90 hover:text-yellow-300 py-2 transition-colors">
              {l.label}
            </button>
          ))}
        </div>
      )}
    </header>
  );
}

/* ── HERO ────────────────────────────────────────────── */
function Hero() {
  return (
    <section id="hero" className="relative min-h-screen flex items-center pt-20 overflow-hidden" style={{ background: "#eef3e4" }}>
      <div className="absolute top-0 right-0 h-full w-1/2 rounded-bl-[40%] pointer-events-none" style={{ background: "rgba(30,92,46,0.07)" }} />
      <div className="max-w-7xl mx-auto px-4 w-full py-20 grid md:grid-cols-2 gap-12 items-center">
        {/* Copy */}
        <div>
          <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full border text-sm font-bold mb-6"
               style={{ background: "rgba(30,92,46,0.08)", borderColor: "rgba(30,92,46,0.2)", color: "#1e5c2e" }}>
            ★ New Items Available Now
          </div>
          <h1 className="font-display text-6xl md:text-7xl lg:text-8xl tracking-wider leading-none uppercase mb-6" style={{ color: "#1e5c2e" }}>
            Experience<br />
            <span style={{ color: "#1a3a1a" }}>The Tasty,</span><br />
            Amazing<br />
            <span style={{ color: "#1a3a1a" }}>Variety.</span>
          </h1>
          <p className="text-lg font-semibold mb-8 max-w-md leading-relaxed" style={{ color: "#5a7a4a" }}>
            Bold flavors, fresh ingredients, and unforgettable bites — made for people who refuse to settle for ordinary.
          </p>
          <div className="flex flex-wrap gap-4">
            <button onClick={() => scrollTo("menu")}
              className="font-display tracking-widest text-lg h-14 px-10 rounded-xl text-white shadow-lg hover:opacity-90 transition-all hover:scale-105"
              style={{ background: "#1e5c2e" }}>
              Explore Menu
            </button>
            <button onClick={() => scrollTo("about")}
              className="font-display tracking-widest text-lg h-14 px-10 rounded-xl border-2 bg-transparent hover:text-white transition-all"
              style={{ borderColor: "#1e5c2e", color: "#1e5c2e" }}
              onMouseEnter={e => { e.currentTarget.style.background = "#1e5c2e"; e.currentTarget.style.color = "#fff"; }}
              onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "#1e5c2e"; }}>
              Our Story
            </button>
          </div>
        </div>

        {/* Food circles */}
        <div className="relative hidden md:flex items-center justify-center h-[460px]">
          {/* Big burger circle */}
          <div className="absolute right-4 top-4 w-60 h-60 rounded-full border-4 border-white shadow-2xl flex items-center justify-center overflow-hidden"
               style={{ background: "linear-gradient(135deg,#1e5c2e,#2e7d42)" }}>
            <div className="text-center text-white">
              <div className="font-display text-4xl">BURGER</div>
              <div className="text-sm font-semibold opacity-75">Classic Double Patty</div>
              <div className="mt-2 text-2xl font-black">₱149</div>
            </div>
          </div>
          {/* Wrap circle */}
          <div className="absolute left-4 bottom-24 w-44 h-44 rounded-full border-4 border-white shadow-xl flex items-center justify-center"
               style={{ background: "linear-gradient(135deg,#1a6644,#2e8c5a)" }}>
            <div className="text-center text-white">
              <div className="font-display text-2xl">WRAP</div>
              <div className="text-xs font-semibold opacity-75">Grilled Chicken</div>
            </div>
          </div>
          {/* Nachos circle */}
          <div className="absolute right-32 bottom-6 w-36 h-36 rounded-full border-4 border-white shadow-xl flex items-center justify-center"
               style={{ background: "linear-gradient(135deg,#3a6a1a,#1e5c2e)" }}>
            <div className="text-center text-white">
              <div className="font-display text-xl">NACHOS</div>
              <div className="text-xs font-semibold opacity-75">Loaded</div>
            </div>
          </div>
          {/* Chevrons decoration */}
          <div className="absolute bottom-20 left-16 flex gap-1 opacity-40">
            {[0,1,2,3,4].map(i => (
              <svg key={i} className="w-4 h-4" fill="none" stroke="#1e5c2e" strokeWidth="2.5" viewBox="0 0 24 24">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

/* ── OFFERS STRIP ─────────────────────────────────────── */
function OffersStrip() {
  const items = [
    { icon: "🕙", text: "Open Daily 10AM–10PM" },
    { icon: "🛵", text: "Free Delivery Within 5km" },
    { icon: "⭐", text: "4.9 Star Rating" },
    { icon: "📞", text: "Order by Phone or Online" },
  ];
  return (
    <section id="offers" className="py-4" style={{ background: "#1e5c2e" }}>
      <div className="max-w-7xl mx-auto px-4 flex flex-wrap justify-center gap-8 md:gap-16 text-white">
        {items.map(item => (
          <div key={item.text} className="flex items-center gap-2 text-sm font-semibold">
            <span>{item.icon}</span>{item.text}
          </div>
        ))}
      </div>
    </section>
  );
}

/* ── MENU SECTION ─────────────────────────────────────── */
function MenuSection({ cart, onAddToCart }) {
  const [category, setCategory] = useState("All");
  const [sort, setSort] = useState("default");

  const products = useMemo(() => {
    let r = [...PRODUCTS];
    if (category !== "All") r = r.filter(p => p.category === category);
    if (sort === "price-asc")  r.sort((a, b) => a.price - b.price);
    if (sort === "price-desc") r.sort((a, b) => b.price - a.price);
    if (sort === "name-asc")   r.sort((a, b) => a.name.localeCompare(b.name));
    return r;
  }, [category, sort]);

  return (
    <section id="menu" className="py-24" style={{ background: "#f0f4e8" }}>
      <div className="max-w-7xl mx-auto px-4">
        <div className="text-center mb-12">
          <h2 className="font-display text-6xl md:text-7xl tracking-wider uppercase mb-2" style={{ color: "#1e5c2e" }}>Our Menu</h2>
          <p className="text-lg font-semibold" style={{ color: "#5a7a4a" }}>Fresh. Bold. Unforgettable.</p>
        </div>

        {/* Filter + Sort */}
        <div className="flex flex-col sm:flex-row gap-4 items-center justify-between mb-10">
          <div className="flex flex-wrap gap-2">
            {CATEGORIES.map(cat => (
              <button key={cat} onClick={() => setCategory(cat)}
                className="px-5 py-2 rounded-full text-sm font-bold transition-all border-2"
                style={category === cat
                  ? { background: "#1e5c2e", color: "#fff", borderColor: "#1e5c2e" }
                  : { background: "#fff", color: "#1e5c2e", borderColor: "rgba(30,92,46,0.25)" }
                }>
                {cat}
              </button>
            ))}
          </div>

          <select value={sort} onChange={e => setSort(e.target.value)}
            className="px-4 py-2 rounded-xl border-2 font-semibold text-sm bg-white"
            style={{ borderColor: "rgba(30,92,46,0.3)", color: "#1e5c2e" }}>
            <option value="default">Featured</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="name-asc">Name: A–Z</option>
          </select>
        </div>

        {/* Grid */}
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
          {products.map(product => {
            const inCart = cart.some(i => i.product.id === product.id);
            return (
              <div key={product.id}
                className="bg-white rounded-2xl overflow-hidden shadow-md transition-all border border-gray-100"
                style={{ transition: "transform 0.2s, box-shadow 0.2s" }}
                onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-4px)"; e.currentTarget.style.boxShadow = "0 20px 40px rgba(30,92,46,0.15)"; }}
                onMouseLeave={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = ""; }}>
                <CardVisual product={product} />
                <div className="p-5">
                  <div className="flex items-start justify-between mb-2">
                    <h4 className="font-bold text-base leading-snug" style={{ color: "#1a3a1a" }}>{product.name}</h4>
                    <span className="font-black text-lg ml-2 shrink-0" style={{ color: "#1e5c2e" }}>₱{product.price}</span>
                  </div>
                  <p className="text-sm mb-4 leading-relaxed" style={{ color: "#5a7a4a" }}>{product.description}</p>
                  <button
                    onClick={() => onAddToCart(product)}
                    className="w-full py-2 rounded-xl font-bold text-sm transition-all"
                    style={inCart
                      ? { background: "rgba(30,92,46,0.1)", color: "#1e5c2e", border: "2px solid #1e5c2e" }
                      : { background: "#1e5c2e", color: "#fff", border: "2px solid #1e5c2e" }
                    }>
                    {inCart ? "✓ Added to Order" : "Add to Order"}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </section>
  );
}

/* ── ABOUT SECTION ────────────────────────────────────── */

  return (
    <section id="about" className="py-24 text-white relative overflow-hidden" style={{ background: "#1e5c2e" }}>
      <div className="absolute top-0 right-0 w-80 h-80 rounded-full opacity-10 pointer-events-none"
           style={{ background: "#fff", transform: "translate(40%, -40%)" }} />
      <div className="max-w-7xl mx-auto px-4 relative z-10">

          <div>
            <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-white/20 text-sm font-bold mb-6"

            <p className="font-display text-2xl tracking-wider uppercase mt-8" style={{ color: "#d4f53c" }}>
              Never settle for ordinary.
            </p>
          </div>
          <div className="grid grid-cols-2 gap-4">

      </div>

  );

/* ── FOOTER ──────────────────────────────────────────── */

/* ── CART DRAWER ──────────────────────────────────────── */
function CartDrawer({ cart, isOpen, onClose, onUpdateQty, onRemove, onCheckout }) {
  const subtotal = cart.reduce((s, i) => s + i.product.price * i.quantity, 0);

  return (
    <>
      <div className={`cart-overlay ${isOpen ? "open" : ""}`} onClick={onClose} />
      <div className={`cart-drawer ${isOpen ? "open" : ""}`}>
        {/* Header */}
        <div className="p-6 flex items-center justify-between flex-shrink-0" style={{ background: "#1e5c2e" }}>
          <span className="font-display text-2xl tracking-widest text-white">YOUR ORDER</span>
          <button onClick={onClose} className="w-9 h-9 rounded-full flex items-center justify-center text-white hover:bg-white/10 transition-colors">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        {/* Items */}
        <div className="flex-1 overflow-y-auto p-6">
          {cart.length === 0 ? (
            <div className="flex flex-col items-center justify-center h-full gap-4 py-20" style={{ color: "#5a7a4a" }}>
              <svg className="w-16 h-16 opacity-20" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24">
                <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 0 1-8 0"/>
              </svg>
              <p className="font-display text-xl tracking-wider text-center" style={{ color: "rgba(30,92,46,0.35)" }}>Your bag is shockingly empty</p>
              <p className="text-sm text-center">Add some items from our menu!</p>
            </div>
          ) : (
            <div className="space-y-4">
              {cart.map(item => {
                const [from, to] = GRADIENTS[item.product.id % GRADIENTS.length].split(",");
                return (
                  <div key={item.product.id} className="flex gap-4 items-center p-4 rounded-xl border"
                       style={{ background: "#f0f4e8", borderColor: "rgba(30,92,46,0.15)" }}>
                    <div className="w-14 h-14 rounded-xl flex items-center justify-center flex-shrink-0"
                         style={{ background: `linear-gradient(135deg,${from},${to})` }}>
                      <span className="font-display text-white text-xs text-center leading-tight px-1">
                        {item.product.name.split(" ")[0]}
                      </span>
                    </div>
                    <div className="flex-1 min-w-0">
                      <h4 className="font-bold text-sm leading-tight" style={{ color: "#1a3a1a" }}>{item.product.name}</h4>
                      <p className="font-bold text-sm" style={{ color: "#1e5c2e" }}>₱{item.product.price}</p>
                      <div className="flex items-center gap-2 mt-2">
                        <button onClick={() => onUpdateQty(item.product.id, -1)}
                          className="w-7 h-7 rounded-full flex items-center justify-center text-white transition-opacity hover:opacity-80"
                          style={{ background: "#1e5c2e" }}>
                          <svg className="w-3 h-3" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                        <span className="w-6 text-center text-sm font-black">{item.quantity}</span>
                        <button onClick={() => onUpdateQty(item.product.id, 1)}
                          className="w-7 h-7 rounded-full flex items-center justify-center text-white transition-opacity hover:opacity-80"
                          style={{ background: "#1e5c2e" }}>
                          <svg className="w-3 h-3" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                      </div>
                    </div>
                    <div className="text-right flex flex-col items-end gap-2">
                      <span className="font-black" style={{ color: "#1a3a1a" }}>₱{item.product.price * item.quantity}</span>
                      <button onClick={() => onRemove(item.product.id)}
                        className="text-red-400 hover:text-red-600 transition-colors">
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
                        </svg>
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Footer */}
        {cart.length > 0 && (
          <div className="p-6 border-t flex-shrink-0 space-y-4" style={{ background: "#f0f4e8", borderColor: "rgba(30,92,46,0.15)" }}>
            <div className="flex justify-between items-center">
              <span className="font-display text-xl tracking-wider" style={{ color: "#1a3a1a" }}>SUBTOTAL</span>
              <span className="font-black text-2xl" style={{ color: "#1e5c2e" }}>₱{subtotal}</span>
            </div>
            <button onClick={onCheckout}
              className="w-full py-4 rounded-xl font-display tracking-widest text-lg text-white shadow-md hover:opacity-90 transition-all"
              style={{ background: "#1e5c2e" }}>
              PROCEED TO CHECKOUT
            </button>
          </div>
        )}
      </div>
    </>
  );
}

/* ── CHECKOUT MODAL ───────────────────────────────────── */
function CheckoutModal({ cart, isOpen, onClose }) {
  const [form, setForm] = useState({ fullName: "", email: "", address: "", paymentMethod: "card", cardNumber: "", expiry: "", cvv: "" });
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(false);
  const [success, setSuccess] = useState(false);
  const orderNum = "SB-" + Math.floor(100000 + Math.random() * 900000);
  const subtotal = cart.reduce((s, i) => s + i.product.price * i.quantity, 0);

  const validate = () => {
    const e = {};
    if (!form.fullName || form.fullName.length < 2) e.fullName = "Full name is required";
    if (!form.email || !/\S+@\S+\.\S+/.test(form.email)) e.email = "Valid email is required";
    if (!form.address || form.address.length < 10) e.address = "Full delivery address is required";
    if (form.paymentMethod === "card") {
      if (!form.cardNumber || form.cardNumber.replace(/\s/g, "").length < 16) e.cardNumber = "Valid card number required";
      if (!form.expiry) e.expiry = "Expiry date required";
      if (!form.cvv || form.cvv.length < 3) e.cvv = "CVV required";
    }
    return e;
  };

  const submit = async (e) => {
    e.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length > 0) { setErrors(errs); return; }
    setErrors({});
    setLoading(true);
    await new Promise(r => setTimeout(r, 2000));
    setLoading(false);
    setSuccess(true);
  };

  const handleClose = () => {
    onClose();
    setSuccess(false);
    setForm({ fullName: "", email: "", address: "", paymentMethod: "card", cardNumber: "", expiry: "", cvv: "" });
    setErrors({});
  };

  const field = (name, label, placeholder, extra = {}) => (
    <div>
      <label className="block text-sm font-bold mb-1" style={{ color: "#1a3a1a" }}>{label}</label>
      <input name={name} value={form[name]} placeholder={placeholder}
        onChange={e => setForm(f => ({ ...f, [name]: e.target.value }))}
        className="w-full px-4 py-2 rounded-xl border-2 font-semibold text-sm transition-colors"
        style={{ borderColor: errors[name] ? "#dc2626" : "rgba(30,92,46,0.25)", color: "#1a3a1a" }}
        {...extra}
      />
      {errors[name] && <p className="text-red-500 text-xs mt-1 font-semibold">{errors[name]}</p>}
    </div>
  );

  return (
    <div className={`modal-overlay ${isOpen ? "open" : ""}`} onClick={e => e.target === e.currentTarget && handleClose()}>
      <div className="modal-box">
        {/* Header */}
        <div className="p-6 flex items-center justify-between flex-shrink-0" style={{ background: "#1e5c2e" }}>
          <span className="font-display text-2xl tracking-widest text-white">{success ? "ORDER PLACED!" : "CHECKOUT"}</span>
          <button onClick={handleClose} className="w-9 h-9 rounded-full flex items-center justify-center text-white hover:bg-white/10 transition-colors">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        {success ? (
          /* Success screen */
          <div className="p-12 flex flex-col items-center justify-center text-center gap-5">
            <div className="w-24 h-24 rounded-full flex items-center justify-center text-white text-4xl shadow-lg"
                 style={{ background: "#1e5c2e" }}>✓</div>
            <h2 className="font-display text-4xl tracking-wider" style={{ color: "#1e5c2e" }}>ORDER CONFIRMED!</h2>
            <p className="text-lg font-semibold" style={{ color: "#5a7a4a" }}>Your food is being prepared with love.</p>
            <div className="px-8 py-4 rounded-xl border" style={{ background: "#eef3e4", borderColor: "rgba(30,92,46,0.2)" }}>
              <p className="text-xs font-bold uppercase tracking-widest mb-1" style={{ color: "#5a7a4a" }}>Order Number</p>
              <p className="font-display text-3xl tracking-wider" style={{ color: "#1e5c2e" }}>{orderNum}</p>
            </div>
            <p className="text-sm" style={{ color: "#5a7a4a" }}>Estimated delivery: 30–45 minutes</p>
            <button onClick={handleClose}
              className="font-display tracking-widest text-lg px-12 py-4 rounded-xl text-white hover:opacity-90 transition-all"
              style={{ background: "#1e5c2e" }}>
              CONTINUE SHOPPING
            </button>
          </div>
        ) : (
          /* Checkout form */
          <div className="modal-body">
            <div className="grid md:grid-cols-2">
              {/* Order summary */}
              <div className="p-6 border-r" style={{ background: "#f0f4e8", borderColor: "rgba(30,92,46,0.15)" }}>
                <h3 className="font-display text-xl tracking-wider uppercase mb-4" style={{ color: "#1e5c2e" }}>Your Order</h3>
                <div className="space-y-3 mb-6">
                  {cart.map(item => (
                    <div key={item.product.id} className="flex justify-between items-center text-sm">
                      <span className="font-semibold" style={{ color: "#1a3a1a" }}>{item.product.name} <span style={{ color: "#5a7a4a" }}>×{item.quantity}</span></span>
                      <span className="font-bold" style={{ color: "#1e5c2e" }}>₱{item.product.price * item.quantity}</span>
                    </div>
                  ))}
                </div>
                <div className="border-t pt-4 flex justify-between items-center" style={{ borderColor: "rgba(30,92,46,0.2)" }}>
                  <span className="font-display text-xl tracking-wider" style={{ color: "#1e5c2e" }}>TOTAL</span>
                  <span className="font-black text-2xl" style={{ color: "#1e5c2e" }}>₱{subtotal}</span>
                </div>
              </div>

              {/* Form */}
              <form onSubmit={submit} className="p-6 space-y-4">
                {field("fullName", "Full Name", "Juan Dela Cruz")}
                {field("email", "Email", "juan@email.com", { type: "email" })}
                {field("address", "Delivery Address", "123 Street, Barangay, City")}

                {/* Payment method */}
                <div>
                  <label className="block text-sm font-bold mb-2" style={{ color: "#1a3a1a" }}>Payment Method</label>
                  <div className="grid grid-cols-3 gap-2">
                    {[["card","Credit Card"],["gcash","GCash"],["cod","COD"]].map(([val, label]) => (
                      <button key={val} type="button"
                        onClick={() => setForm(f => ({ ...f, paymentMethod: val }))}
                        className="py-2 px-3 rounded-xl border-2 text-xs font-bold transition-all"
                        style={form.paymentMethod === val
                          ? { borderColor: "#1e5c2e", background: "rgba(30,92,46,0.1)", color: "#1e5c2e" }
                          : { borderColor: "rgba(30,92,46,0.2)", color: "#5a7a4a" }
                        }>
                        {label}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Card fields */}
                {form.paymentMethod === "card" && (
                  <div className="space-y-3">
                    {field("cardNumber", "Card Number", "1234 5678 9012 3456", { maxLength: 19 })}
                    <div className="grid grid-cols-2 gap-3">
                      {field("expiry", "Expiry", "MM/YY", { maxLength: 5 })}
                      {field("cvv", "CVV", "123", { maxLength: 4 })}
                    </div>
                  </div>
                )}

                {/* GCash */}
                {form.paymentMethod === "gcash" && (
                  <div className="border-2 border-dashed rounded-xl p-6 text-center"
                       style={{ borderColor: "rgba(30,92,46,0.35)", background: "rgba(30,92,46,0.05)" }}>
                    <div className="w-28 h-28 border rounded-xl mx-auto mb-3 flex items-center justify-center"
                         style={{ background: "rgba(30,92,46,0.08)", borderColor: "rgba(30,92,46,0.2)" }}>
                      <span className="text-xs font-bold" style={{ color: "rgba(30,92,46,0.4)" }}>QR CODE</span>
                    </div>
                    <p className="font-semibold text-sm" style={{ color: "#1e5c2e" }}>Scan with GCash to pay</p>
                    <p className="text-xs mt-1" style={{ color: "#5a7a4a" }}>Account: ShockBites Official</p>
                  </div>
                )}

                <button type="submit" disabled={loading}
                  className="w-full py-4 rounded-xl font-display tracking-widest text-lg text-white transition-all flex items-center justify-center gap-3"
                  style={{ background: "#1e5c2e", opacity: loading ? 0.8 : 1 }}>
                  {loading ? (
                    <><div className="spinner" />Placing Order...</>
                  ) : "PLACE ORDER"}
                </button>
              </form>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── APP ─────────────────────────────────────────────── */
function App() {
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [checkoutOpen, setCheckoutOpen] = useState(false);

  const addToCart = product => {
    setCart(prev => {
      const existing = prev.find(i => i.product.id === product.id);
      if (existing) return prev.map(i => i.product.id === product.id ? { ...i, quantity: i.quantity + 1 } : i);
      return [...prev, { product, quantity: 1 }];
    });
  };

  const updateQty = (id, delta) => {
    setCart(prev => prev.map(i => i.product.id === id ? { ...i, quantity: i.quantity + delta } : i).filter(i => i.quantity > 0));
  };

  const remove = id => setCart(prev => prev.filter(i => i.product.id !== id));

  const cartCount = cart.reduce((s, i) => s + i.quantity, 0);

  const openCheckout = () => { setCartOpen(false); setCheckoutOpen(true); };

  return (
    <>
      <Navbar cartCount={cartCount} onCartOpen={() => setCartOpen(true)} />
      <Hero />
      <OffersStrip />
      <MenuSection cart={cart} onAddToCart={addToCart} />
      <About />
      <Contact />
      <Footer />
      <CartDrawer
        cart={cart}
        isOpen={cartOpen}
        onClose={() => setCartOpen(false)}
        onUpdateQty={updateQty}
        onRemove={remove}
        onCheckout={openCheckout}
      />
      <CheckoutModal
        cart={cart}
        isOpen={checkoutOpen}
        onClose={() => { setCheckoutOpen(false); setCart([]); }}
      />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
